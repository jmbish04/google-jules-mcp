name = "jules-mcp-worker"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
node_compat = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "jules_sessions"
database_id = "placeholder-will-be-created"
migrations_dir = "migrations"

# AI Gateway binding for Workers AI
[ai]
binding = "AI"

# Cron trigger - runs hourly to check on Jules sessions
[triggers]
crons = ["0 * * * *"]  # Every hour

# Assets binding for frontend
[assets]
directory = "frontend/dist"
binding = "ASSETS"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put)
# STITCH_API_KEY
# OPENAI_API_KEY
# AI_GATEWAY_ACCOUNT_ID
# AI_GATEWAY_NAME
